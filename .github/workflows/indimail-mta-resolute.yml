name: indimail-mta:resolute container image

on:
  push:
    paths:
      - '**/indimail-mta/resolute/**'
      - .github/workflows/indimail-mta-resolute.yml
      - '!**.md'
  workflow_dispatch:

jobs:
  build_and_push:
    name: build and push container image
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v2

      - name: login
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login --username "${{ github.repository_owner }}" --password-stdin ghcr.io
          echo "${{ secrets.DOCKER_PAT }}" | docker login docker.io --username cprogrammer --password-stdin

      - name: build
        run: |
          cp indimail-mta/resolute/Dockerfile .
          docker build --tag "ghcr.io/${{ github.repository_owner }}/indimail-mta:resolute" .

      - name: push
        run: |
          docker push "ghcr.io/${{ github.repository_owner }}/indimail-mta:resolute"
          docker image tag "ghcr.io/${{ github.repository_owner }}/indimail-mta:resolute" docker.io/cprogrammer/indimail-mta:resolute
          docker push docker.io/cprogrammer/indimail-mta:resolute
